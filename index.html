<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil NFC</title>
    <style>
        /* CSS: Aquí es donde damos estilo y colores */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 300px;
        }
        h1 { color: #333; }
        p { color: #666; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Hola! Soy Pompellio</h1>
        <p>Bienvenido a mi página conectada por NFC.</p>
        <a href="https://tu-link-de-archivo.com" class="btn">Descargar Archivo Seguro</a>
    </div>

</body>
</html>
